<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alhamd Sales Console — Offline</title>
  <style>
    :root { --primary: #0A6E5C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #f0fdf4;
      color: #0f172a;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; max-width: 320px; }
    button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #085e4f; }
  </style>
</head>
<body>
  <div class="logo">📱</div>
  <h1>You're offline</h1>
  <p>Alhamd Sales Console needs an internet connection. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
